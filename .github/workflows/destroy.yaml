name: My Destroy Pipeline

run-name: Destroy pipeline triggered by ${{ github.actor }}

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  terraform-destroy:
    runs-on: ubuntu-latest
    environment: terraform-destroy

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::499024813019:role/githubs-action-destroypipeline
          aws-region: eu-west-2

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.10.0

      - name: Terraform init
        working-directory: Terraform-ecs
        run: terraform init

      - name: Create Terraform destroy plan
        working-directory: Terraform-ecs
        run: terraform plan -destroy -out=destroy.tfplan

      - name: Apply Terraform destroy plan
        working-directory: Terraform-ecs
        run: terraform apply -auto-approve destroy.tfplan

      - name: Verify Terraform state is empty
        working-directory: Terraform-ecs
        run: |
          state_list=$(terraform state list)

          if [ -n "$state_list" ]; then
            echo "There are still resources in the Terraform state:"
            echo "$state_list"
            exit 1
          fi

          echo "Terraform state is empty."