name: My Application CD Pipeline

on:
  workflow_run:
    workflows:
      - My Application CI Pipeline
    types:
      - completed
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '14'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
         role-to-assume: arn:aws:iam::499024813019:role/githubs-action-cdpipeline
         aws-region: eu-west-2

      - name: login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Pull image from Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: threat-composer
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker pull $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

  terraform-check:
    runs-on: ubuntu-latest
    needs: deploy



    steps: 
      
      - name: Terraform init
        working-directory: Terraform-ec2
        run: terraform init
        

      - name: Terraform apply
        working-directory: Terraform-ec2
        run: terraform apply -auto-approve
        

  deploy-to-ecs:
    needs: deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '14'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
         role-to-assume: arn:aws:iam::499024813019:role/githubs-action-cdpipeline
         aws-region: eu-west-2

      - name: login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Update ECS service with new image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: my-application
          IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}
        run: |
          aws ecs update-service --cluster my-cluster --service my-service --force-new-deployment --image $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Verify deployment
        run: |
          curl --fail https://your-domain.com/  