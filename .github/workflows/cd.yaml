name: My Application CD Pipeline

run-name: CD Pipeline triggered by ${{ github.actor }}

on:
  workflow_run:
    workflows:
      - My Application CI Pipeline
    types:
      - completed
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '14'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
         role-to-assume: arn:aws:iam::499024813019:role/githubs-action-cdpipeline
         aws-region: eu-west-2

      - name: login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Pull image from Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: threat-composer
          IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}
        run: |
          docker pull $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

  terraform-check:
    runs-on: ubuntu-latest
    needs: deploy

    steps: 

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
         role-to-assume: arn:aws:iam::499024813019:role/githubs-action-cdpipeline
         aws-region: eu-west-2
         
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v1
        with:
          terraform_version: 1.10.0
      
      - name: Terraform init
        working-directory: Terraform-ec2
        run: terraform init
        

      - name: Terraform apply
        working-directory: Terraform-ec2
        run: terraform apply -auto-approve
        

  verification-deployment:
     runs-on: ubuntu-latest
     needs: terraform-check

     steps:
      - name: Verify deployment
        run: | 
          curl --fail https://www.zakariyaalab.com/  